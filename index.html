<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Mercado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>🛒 Lista de Mercado</h1>
        <p>Compartilhe a mesma lista entre dispositivos salvando direto no GitHub.</p>
      </header>

      <section class="card form-card" aria-labelledby="novo-item-title">
        <h2 id="novo-item-title">Adicionar novo item</h2>
        <form id="item-form" class="item-form">
          <label>
            Nome do item
            <input type="text" id="nome" required placeholder="Ex.: Arroz" />
          </label>
          <label>
            Quantidade
            <input type="number" id="quantidade" min="0" step="1" required placeholder="1" />
          </label>
          <label>
            Categoria
            <select id="categoria" required></select>
          </label>
          <label>
            Valor unitário (R$)
            <input type="number" id="valor" min="0" step="0.10" required placeholder="0,00" />
          </label>
          <button type="submit">Adicionar</button>
        </form>
      </section>

      <section class="card sync-card" aria-labelledby="sync-title" style="display: none;">
        <h2 id="sync-title">Configuração do arquivo no GitHub</h2>
        <form id="sync-form" class="sync-form">
          <label>
            Owner
            <input id="gh-owner" placeholder="augustoburatto" />
          </label>
          <label>
            Repositório
            <input id="gh-repo" placeholder="ListaMercadoNova" />
          </label>
          <label>
            Branch
            <input id="gh-branch" placeholder="main" />
          </label>
          <label>
            Caminho do arquivo
            <input id="gh-path" placeholder="data/lista-mercado.json" />
          </label>
          <label class="token-field">
            Token GitHub (com permissão de escrita no repositório)
            <input id="gh-token" type="password" placeholder="ghp_..." />
          </label>
        </form>
      </section>

      <section class="card table-card" aria-labelledby="lista-title">
        <div class="section-header">
          <h2 id="lista-title">Itens da lista</h2>
          <div class="actions">
            <button id="salvar-arquivo" class="btn-secondary" type="button">Salvar e atualizar GitHub</button>
            <button class="btn-refresh" title="Atualizar" onclick="carregarDadosIniciais(true);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
                <polyline points="21 3 21 9 15 9"/>
              </svg>
            </button>
          </div>
        </div>
        <p id="save-status" class="save-status" aria-live="polite"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome do Item</th>
                <th>Quantidade</th>
                <th>Categoria</th>
                <th>Valor Unitário</th>
                <th>Valor Total</th>
                <th>Carrinho</th>
                <th>Remover</th>
              </tr>
            </thead>
            <tbody id="lista-body"></tbody>
          </table>
        </div>
        <footer class="total-footer">
          <strong>Total geral:</strong>
          <span id="total-geral">R$ 0,00</span>
        </footer>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
